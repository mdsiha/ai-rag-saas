name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-docker-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: docker build ./backend -t ai-rag-backend

      - name: Build Frontend Docker Image
        run: |
          docker build ./frontend \
            --build-arg NEXT_PUBLIC_API_URL=https://api-ai-rag.md-x.dev \
            -t ai-rag-frontend
