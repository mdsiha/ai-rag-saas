name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Build Docker Backend
        run: docker build ./backend -t ai-rag-backend

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Dependencies
        run: |
          cd frontend
          npm install
      - name: Build Next.js
        run: |
          cd frontend
          npm run build
      - name: Build Docker Frontend
        run: docker build ./frontend -t ai-rag-frontend
