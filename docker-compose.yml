services:
  backend:
    build: ./backend
    container_name: ai-rag-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads
      - hf_cache:/root/.cache/huggingface
    restart: always

  frontend:
    build: ./frontend
    container_name: ai-rag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  hf_cache:
