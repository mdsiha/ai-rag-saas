services:
  backend:
    build: ./backend
    container_name: ai-rag-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads
      - hf_cache:/root/.cache/huggingface
    restart: always

  frontend:
    build: ./frontend
    container_name: ai-rag-frontend
    environment:
      - NEXT_PUBLIC_API_URL=https://api-ai-rag.md-x.dev
    depends_on:
      - backend
    restart: always

volumes:
  hf_cache:
